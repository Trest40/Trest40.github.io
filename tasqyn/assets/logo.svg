<svg width="520" height="160" viewBox="0 0 520 160" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Tasqyn">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e0f2fe"/>
      <stop offset="1" stop-color="#7dd3fc"/>
    </linearGradient>
  </defs>

  <!-- App mark: rounded square + shield silhouette + wave -->
  <g>
    <rect x="8" y="20" width="120" height="120" rx="30" fill="url(#bg)"/>
    <!-- shield (protection / early warning) -->
    <path d="M68 38 L104 50 V86 C104 108 88 120 68 128 C48 120 32 108 32 86 V50 Z"
          fill="#0b1f3a" opacity="0.28"/>
    <!-- three rising waves -->
    <path d="M40 96 q12 -14 24 0 q12 14 24 0" stroke="url(#wave)" stroke-width="8"
          stroke-linecap="round" fill="none"/>
    <path d="M40 78 q12 -14 24 0 q12 14 24 0" stroke="#bae6fd" stroke-width="7"
          stroke-linecap="round" fill="none" opacity="0.85"/>
    <path d="M44 60 q10 -12 20 0 q10 12 20 0" stroke="#e0f2fe" stroke-width="6"
          stroke-linecap="round" fill="none" opacity="0.7"/>
  </g>

  <!-- Wordmark -->
  <text x="150" y="92" font-family="Segoe UI, Helvetica, Arial, sans-serif"
        font-size="56" font-weight="800" fill="#0f172a" letter-spacing="-1">Tasqyn</text>
  <text x="152" y="122" font-family="Segoe UI, Helvetica, Arial, sans-serif"
        font-size="17" font-weight="500" fill="#0ea5e9" letter-spacing="0.5">AI flood early-warning · тасқын</text>
</svg>
